<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="dark">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #1a1a2e;
  color: #eee;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  text-align: center;
  max-width: 600px;
  padding: 2rem;
}
.icon {
  font-size: 64px;
  margin-bottom: 1rem;
  opacity: 0.6;
}
h1 {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  color: #e94560;
}
p {
  color: #aaa;
  line-height: 1.6;
}
.url {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: #16213e;
  border-radius: 8px;
  font-family: monospace;
  font-size: 0.9rem;
  word-break: break-all;
  color: #888;
}
.retry {
  display: inline-block;
  margin-top: 1.5rem;
  padding: 0.6rem 1.5rem;
  background: #0f3460;
  color: #eee;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.9rem;
}
.retry:hover {
  background: #1a5276;
}
</style>
</head>
<body>
<div class="container">
  <div class="icon">⚠</div>
  <h1>Page indisponible</h1>
  <p>Impossible de charger l'URL.<br>Nouvelle tentative automatique dans quelques instants...</p>
  <div class="url" id="url"></div>
  <button class="retry" onclick="location.reload()">Réessayer maintenant</button>
</div>
<script>
document.getElementById('url').textContent = location.href;
</script>
</body>
</html>
