name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run dist
        if: runner.os == 'Windows'
        shell: pwsh

      - run: npm run dist:linux
        if: runner.os == 'Linux'

      - uses: actions/upload-artifact@v4
        with:
          name: murbroref-${{ runner.os }}
          path: dist/
